name: Feature Request
description: Suggest a feature for Loom
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests should describe the PROBLEM first, then the proposed solution.
        Consider: does this belong in Loom (engine) or Cortex (kernel)?

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
      placeholder: I need to... but currently Loom doesn't support...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Where does this belong?
      options:
        - Loom (engine — core loop, providers, tools, compaction)
        - Cortex (kernel — profiles, process management, gateway)
        - Not sure
    validations:
      required: true
