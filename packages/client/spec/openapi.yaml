# The Ownware gateway wire contract — REST surface, v1.
#
# This file is the versioned PROMISE @ownware/client is built against.
# Scope is deliberate: only the versioned public operations below. The
# gateway exposes many more routes (profiles CRUD, connectors,
# schedules, …) — those are the management surface, INTERNAL and
# unstable until they appear here.
#
# Companion: asyncapi.yaml documents the SSE event vocabulary.

openapi: 3.1.0
info:
  title: Ownware Gateway — core wire contract
  version: 0.30.0
  description: >
    Drive a Ownware agent from any language: start a run, stream its
    events, answer permission prompts. Bearer auth applies to every
    route except /health whenever the gateway has auth enabled (always
    true on non-loopback binds; token at <dataDir>/gateway-token).

servers:
  - url: http://localhost:3011
    description: Default local gateway (ownware serve prints yours)

security:
  - bearer: []

paths:
  /api/v1/health:
    get:
      operationId: health
      security: []  # the ONE unauthenticated route
      summary: Liveness.
      responses:
        '200':
          description: Gateway is up.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, const: ok }
                  version: { type: string }
                  uptime: { type: number }

  /api/v1/capabilities:
    get:
      operationId: capabilities
      summary: Discover the deliberately published Gateway contract.
      responses:
        '200':
          description: Public contract version and supported capabilities.
          content:
            application/json:
              schema:
                type: object
                required: [contract, capabilities, limits]
                properties:
                  contract:
                    type: object
                    required: [name, major, revision]
                    properties:
                      name: { type: string, const: ownware.gateway }
                      major: { type: integer, const: 1 }
                      revision: { type: string }
                  capabilities:
                    type: array
                    items:
                      type: object
                      required: [id, version]
                      properties:
                        id: { type: string }
                        version: { type: integer, minimum: 1 }
                  limits: { $ref: '#/components/schemas/PublicGatewayLimits' }
        '401': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/connections:
    get:
      operationId: listConnections
      summary: List the install owner's provider-neutral connection inventory.
      description: >
        Requires an authenticated install owner; delegated principals cannot
        enumerate connection state. Only the latest material state per logical
        capability is returned. Provider identity, vendor account handles,
        credential/session material, raw errors and explicitly revoked history
        are never projected. A connection is not permission: every use still
        requires a separate scoped grant and live evaluator decision.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - in: query
          name: cursor
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Bounded content-free inventory with fixed recovery guidance.
          headers:
            Cache-Control:
              schema: { type: string, const: no-store }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConnectionList' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/sources:
    post:
      operationId: registerSource
      summary: Register one logical source using safe control metadata only.
      description: >
        Requires a delegated principal; workspace and profile scope come only
        from the verified bearer. The request cannot carry paths, URLs, bytes,
        storage locators, or workspace/profile authority. Equal metadata under
        distinct idempotency keys remains distinct logical sources.
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SourceRegistrationInput' }
      responses:
        '202':
          description: Pending safe manifest. No content or storage detail is returned.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SourceManifest' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/SourceCreationConflictResponse' }
        '413': { $ref: '#/components/responses/ErrorResponse' }
        '500': { $ref: '#/components/responses/ErrorResponse' }
    get:
      operationId: listSources
      summary: List one bounded page of safe manifests in the verified scope.
      description: Requires a delegated principal. An empty scope returns an empty page.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - in: query
          name: cursor
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Bounded source page without raw content or storage detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SourceList' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/sources/{sourceId}:
    get:
      operationId: getSource
      summary: Read one safe source manifest in the verified scope.
      description: Cross-workspace/profile identities are indistinguishable from absence.
      parameters:
        - in: path
          name: sourceId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Safe source control manifest.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SourceManifest' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/sources/{sourceId}/deletions:
    post:
      operationId: createSourceDeletion
      summary: Freeze one exact source revision and enqueue verified deletion.
      description: >
        Requires the separate source_deletions.create authority and a UUID
        idempotency key. Workspace and profile scope come only from the delegated
        bearer. The response projects only safe progress counts and timestamps.
      parameters:
        - { in: path, name: sourceId, required: true, schema: { type: string, format: uuid } }
        - { in: header, name: Idempotency-Key, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [expectedRevision]
              properties:
                expectedRevision: { type: integer, minimum: 1 }
              additionalProperties: false
      responses:
        '202':
          description: Deletion durably accepted or exactly replayed; poll for verified terminal truth.
          content: { application/json: { schema: { $ref: '#/components/schemas/SourceDeletion' } } }
        '400': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '401': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '403': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '404': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '409': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '413': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '429': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '500': { $ref: '#/components/responses/SourceDeletionErrorResponse' }

  /api/v1/source-deletions/{jobId}:
    get:
      operationId: getSourceDeletion
      summary: Read one scoped source-deletion projection or tombstone.
      description: >
        Requires source_deletions.read. Cross-workspace/profile identities are
        indistinguishable from absence. Artifact identities, paths, object keys,
        claims and raw failures are never returned.
      parameters:
        - { in: path, name: jobId, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Current safe deletion progress or verified minimal tombstone.
          content: { application/json: { schema: { $ref: '#/components/schemas/SourceDeletion' } } }
        '400': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '401': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '403': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '404': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '429': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '500': { $ref: '#/components/responses/SourceDeletionErrorResponse' }

  /api/v1/source-deletions/{jobId}/cancel:
    post:
      operationId: cancelSourceDeletion
      summary: Request source-deletion cancellation before destruction begins.
      parameters:
        - { in: path, name: jobId, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: false }
      responses:
        '202':
          description: Cancellation requested or already requested; poll for terminal truth.
          content: { application/json: { schema: { $ref: '#/components/schemas/SourceDeletionCancellationResult' } } }
        '400': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '401': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '403': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '404': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '409': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '413': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '429': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '500': { $ref: '#/components/responses/SourceDeletionErrorResponse' }

  /api/v1/source-deletions/{jobId}/retry:
    post:
      operationId: retrySourceDeletion
      summary: Requeue only the remaining inventory of a partial deletion.
      parameters:
        - { in: path, name: jobId, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: false }
      responses:
        '202':
          description: The same partial deletion inventory is queued for another verified pass.
          content: { application/json: { schema: { $ref: '#/components/schemas/SourceDeletionRetryResult' } } }
        '400': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '401': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '403': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '404': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '409': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '413': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '429': { $ref: '#/components/responses/SourceDeletionErrorResponse' }
        '500': { $ref: '#/components/responses/SourceDeletionErrorResponse' }

  /api/v1/sources/{sourceId}/upload-sessions:
    post:
      operationId: createSourceUploadSession
      summary: Create a short-lived source-bound direct upload session.
      parameters:
        - { in: path, name: sourceId, required: true, schema: { type: string, format: uuid } }
        - { in: header, name: Idempotency-Key, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSourceUploadSessionInput' }
      responses:
        '201':
          description: Bounded session metadata; no placement path or token is returned.
          content: { application/json: { schema: { $ref: '#/components/schemas/SourceUploadSession' } } }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/SourceCreationConflictResponse' }

  /api/v1/source-uploads/{uploadId}:
    patch:
      operationId: writeSourceUploadChunk
      summary: Stream one exact-offset verified chunk to runtime-private staging.
      parameters:
        - { in: path, name: uploadId, required: true, schema: { type: string, format: uuid } }
        - { in: header, name: Upload-Offset, required: true, schema: { type: integer, minimum: 0 } }
        - { in: header, name: Upload-Chunk-Checksum, required: true, schema: { type: string, pattern: '^sha256:[0-9a-f]{64}$' } }
      requestBody:
        required: true
        content:
          application/offset+octet-stream:
            schema: { type: string, contentMediaType: application/octet-stream, maxLength: 1048576 }
      responses:
        '200':
          description: Actual durable checkpoint; identical prior chunks replay without append.
          content: { application/json: { schema: { $ref: '#/components/schemas/SourceUploadChunkResult' } } }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '413': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/source-uploads/{uploadId}/complete:
    post:
      operationId: completeSourceUpload
      summary: Verify and atomically accept one immutable source version.
      description: >
        The upload session privately captures the source revision and current
        version at creation. Completion advances that exact identity once and
        resets current inspection and preparation state. A stale completion
        returns `source_upload_refresh_conflict` with the safe actual revision
        and current version identity; request bodies cannot override the fence.
      parameters:
        - { in: path, name: uploadId, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Idempotent replay of an already completed version.
          content: { application/json: { schema: { $ref: '#/components/schemas/SourceUploadCompletionResult' } } }
        '201':
          description: Newly accepted immutable version.
          content: { application/json: { schema: { $ref: '#/components/schemas/SourceUploadCompletionResult' } } }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
        '500': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/sources/{sourceId}/versions/{sourceVersionId}:
    get:
      operationId: getSourceVersion
      summary: Read one immutable safe version manifest.
      parameters:
        - { in: path, name: sourceId, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: sourceVersionId, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Version metadata without raw bytes or a storage locator.
          content: { application/json: { schema: { $ref: '#/components/schemas/SourceVersionManifest' } } }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/sources/{sourceId}/versions/{sourceVersionId}/preparations:
    post:
      operationId: createSourcePreparation
      summary: Enqueue one allowlisted preparation for an inspected current source version.
      description: >
        Requires the separate source_preparations.create authority and a UUID
        idempotency key. The fixed extract_text and prepare_data_view operations
        are accepted; workspace and profile scope come only from the delegated
        bearer. Data View output cells and its private locator are never returned.
      parameters:
        - { in: path, name: sourceId, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: sourceVersionId, required: true, schema: { type: string, format: uuid } }
        - { in: header, name: Idempotency-Key, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [operation]
              properties:
                operation: { type: string, enum: [extract_text, prepare_data_view] }
              additionalProperties: false
      responses:
        '202':
          description: Durable preparation job accepted; poll the unified job projection.
          content: { application/json: { schema: { $ref: '#/components/schemas/SourceJob' } } }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/SourceCreationConflictResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
        '500': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/sources/{sourceId}/versions/{sourceVersionId}/jobs:
    post:
      operationId: createSourceJob
      summary: Enqueue one allowlisted operation for an exact immutable source version.
      description: >
        Workspace and profile scope come only from the delegated bearer. Creation
        requires a UUID idempotency key; an exact completed retry replays the
        original safe job projection across Gateway restarts.
      parameters:
        - { in: path, name: sourceId, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: sourceVersionId, required: true, schema: { type: string, format: uuid } }
        - { in: header, name: Idempotency-Key, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [operation]
              properties:
                operation: { type: string, const: inspect_format }
              additionalProperties: false
      responses:
        '202':
          description: Durable job accepted. The response contains no worker or storage detail.
          content: { application/json: { schema: { $ref: '#/components/schemas/SourceJob' } } }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/SourceCreationConflictResponse' }

  /api/v1/source-resources/{resourceId}:
    get:
      operationId: getSourceResource
      summary: Read one scoped content-free derived-resource manifest.
      description: >
        Requires the separate source_resources.read authority. Cross-workspace/profile
        identities are indistinguishable from absence. The response is lineage,
        policy, coverage and freshness metadata only; content requires a separate
        live grant and separately authorized operation.
      parameters:
        - { in: path, name: resourceId, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Closed safe resource manifest without content, paths, placement or diagnostics.
          content: { application/json: { schema: { $ref: '#/components/schemas/SourceResourceManifest' } } }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/source-data-views/{dataViewId}:
    get:
      operationId: getSourceDataView
      summary: Read one scoped content-free Data View manifest.
      description: >
        Requires the separate source_data_views.read authority. Cross-workspace/profile
        identities and views whose source is deleting are indistinguishable from absence.
        Field labels are untrusted source header labels; no cells, row values, private
        placement, diagnostics, grant, or query authority are returned.
      parameters:
        - { in: path, name: dataViewId, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Validated Data View lineage, policy, field shape, counts, and freshness only.
          headers:
            Cache-Control:
              schema: { type: string, const: no-store }
          content: { application/json: { schema: { $ref: '#/components/schemas/SourceDataViewManifest' } } }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/source-data-views/{dataViewId}/access-grants:
    post:
      operationId: createDataViewQueryGrant
      summary: Owner-only admission of one exact Data View observation fence.
      description: >
        Authentication must be enabled and the bearer must be the install owner.
        The request names explicit current field identities and one bounded row window;
        the Gateway atomically derives and stores the exact stable row identities. The
        fixed grant is source_data_view / source_data_views.query / observe. It grants
        no manifest, source-content, search, write, filter, sort, aggregation, SQL or
        expression authority. Exact idempotency retries return the same minimal receipt.
      parameters:
        - { in: path, name: dataViewId, required: true, schema: { type: string, format: uuid } }
        - { in: header, name: Idempotency-Key, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDataViewQueryGrantInput' }
      responses:
        '201':
          description: Minimal immutable mutation receipt; no cells, row identities or policy detail.
          headers:
            Cache-Control:
              schema: { type: string, const: no-store }
          content: { application/json: { schema: { $ref: '#/components/schemas/AccessGrantMutationReceipt' } } }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '413': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/source-data-views/{dataViewId}/query:
    post:
      operationId: querySourceDataView
      summary: Read one exact field list and bounded row window after live grant evaluation.
      description: >
        Requires a subject-bound delegated principal carrying source_data_views.query.
        Workspace, profile, subject, purpose and channel come only from verified signed
        claims; the body cannot override identity or authority. The live grant, strict
        current lineage/lifecycle floor and artifact integrity are checked before and after the
        bounded selection. Protected denial, stale/deleting state, tamper and race failures
        return no cells through one generic unavailable response. This is a retry-safe read
        POST with no durable side effect and no SQL, filter, sort, aggregation, expression
        or arbitrary row predicate.
      parameters:
        - { in: path, name: dataViewId, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuerySourceDataViewInput' }
      responses:
        '200':
          description: Verified current cells with complete immutable lineage and bounded-window truth.
          headers:
            Cache-Control:
              schema: { type: string, const: no-store }
          content: { application/json: { schema: { $ref: '#/components/schemas/ProtectedSourceDataViewSelection' } } }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '413': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/source-resources/{resourceId}/access-grants:
    post:
      operationId: createAccessGrant
      summary: Owner-only creation of one bounded protected-source read or search grant.
      description: >
        Authentication must be enabled and the bearer must be the install owner.
        Workspace/profile scope and immutable source lineage are derived by the
        Gateway. An exact UUID idempotency retry returns only the same minimal receipt.
      parameters:
        - { in: path, name: resourceId, required: true, schema: { type: string, format: uuid } }
        - { in: header, name: Idempotency-Key, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAccessGrantInput' }
      responses:
        '201':
          description: Minimal immutable mutation receipt; no subject, consent, policy, or storage detail.
          content: { application/json: { schema: { $ref: '#/components/schemas/AccessGrantMutationReceipt' } } }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '413': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/source-resources/{resourceId}/content:
    post:
      operationId: readSourceContent
      summary: Read one bounded UTF-8 range after live grant and source-state evaluation.
      description: >
        Requires a delegated principal with source_content.read. Workspace, profile,
        subject, purpose and channel come only from that principal. Owner tokens cannot bypass
        the route or grant. Grant, lineage, availability, freshness and deletion truth
        are checked before and after the private byte read; denial is indistinguishable
        from absence.
      parameters:
        - { in: path, name: resourceId, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReadSourceContentInput' }
      responses:
        '200':
          description: Verified current source bytes and safe immutable lineage.
          content: { application/json: { schema: { $ref: '#/components/schemas/ProtectedSourceContent' } } }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '413': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/source-resources/{resourceId}/content/search:
    post:
      operationId: searchSourceContent
      summary: Search one current prepared UTF-8 resource after live grant evaluation.
      description: >
        Requires a delegated principal with source_content.search, which is a
        separate grant from source_content.read. The Gateway performs a bounded
        literal scan without a model, network access, SQL, shell, or durable index.
        Workspace, profile, subject, purpose and channel come only from that principal.
        Grant and exact current lineage are checked before and after the scan;
        timeout returns no partial matches and denial is indistinguishable from absence.
      parameters:
        - { in: path, name: resourceId, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SearchSourceContentInput' }
      responses:
        '200':
          description: Byte-ordered bounded passages with stable evidence identities.
          content: { application/json: { schema: { $ref: '#/components/schemas/ProtectedSourceSearchResult' } } }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '504': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/access-grants:
    get:
      operationId: listAccessGrants
      summary: Owner-only bounded list of current grant revisions and lifecycle truth.
      parameters:
        - { in: query, name: limit, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - { in: query, name: cursor, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Current grant heads ordered by opaque identity.
          content: { application/json: { schema: { $ref: '#/components/schemas/AccessGrantList' } } }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/access-grants/{grantId}:
    get:
      operationId: getAccessGrant
      summary: Owner-only read of one current immutable grant revision.
      parameters:
        - { in: path, name: grantId, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Current immutable grant revision.
          content: { application/json: { schema: { $ref: '#/components/schemas/AccessGrant' } } }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/access-grants/{grantId}/revoke:
    post:
      operationId: revokeAccessGrant
      summary: Owner-only revocation fenced by the exact current revision.
      parameters:
        - { in: path, name: grantId, required: true, schema: { type: string, format: uuid } }
        - { in: header, name: Idempotency-Key, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [expectedRevision]
              properties:
                expectedRevision: { type: integer, minimum: 1 }
              additionalProperties: false
      responses:
        '200':
          description: Minimal immutable revocation receipt.
          content: { application/json: { schema: { $ref: '#/components/schemas/AccessGrantMutationReceipt' } } }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '413': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/source-jobs/{jobId}:
    get:
      operationId: getSourceJob
      summary: Read one scoped safe source-job projection.
      description: Cross-workspace/profile identities are indistinguishable from absence.
      parameters:
        - { in: path, name: jobId, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Current durable state without claims, leases, retry times, paths, content, or raw diagnostics.
          content: { application/json: { schema: { $ref: '#/components/schemas/SourceJob' } } }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/source-jobs/{jobId}/cancel:
    post:
      operationId: cancelSourceJob
      summary: Request cancellation without claiming that in-flight inspection stopped.
      parameters:
        - { in: path, name: jobId, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { type: object, additionalProperties: false }
      responses:
        '202':
          description: Cancellation requested or already requested; poll the job for terminal truth.
          content: { application/json: { schema: { $ref: '#/components/schemas/SourceJobCancellationResult' } } }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/candidates/validate:
    post:
      operationId: validateCandidate
      summary: Validate bounded portable Agent Kit bytes without installing or activating them.
      description: >
        Accepts only direct base64 file bytes with portable relative names. Host paths,
        URLs and ambient filesystem references are not accepted. Validation occurs in
        an isolated temporary directory that is removed before a successful response.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  minItems: 1
                  maxItems: 1000
                  items:
                    type: object
                    required: [path, contentBase64]
                    properties:
                      path:
                        type: string
                        minLength: 1
                        maxLength: 256
                        description: Unique portable relative path; traversal, absolute paths and backslashes are rejected.
                      contentBase64:
                        type: string
                        contentEncoding: base64
                    additionalProperties: false
              additionalProperties: false
      responses:
        '200':
          description: Safe validation result. Invalid candidates return valid=false rather than being installed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CandidateValidationResult' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '413': { $ref: '#/components/responses/ErrorResponse' }
        '500': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/candidates/stage:
    post:
      operationId: stageCandidate
      summary: Privately stage exact validated candidate bytes without activation.
      description: >
        Revalidates direct portable bytes, verifies the caller-supplied opaque
        identity after private placement, and records an explicit ready or
        failure state. It never changes the active profile. Repeating the same
        ready identity is idempotent after stored-byte verification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [candidateId, files]
              properties:
                candidateId:
                  type: string
                  pattern: '^sha256:[0-9a-f]{64}$'
                files:
                  type: array
                  minItems: 1
                  maxItems: 1000
                  items:
                    type: object
                    required: [path, contentBase64]
                    properties:
                      path: { type: string, minLength: 1, maxLength: 256 }
                      contentBase64: { type: string, contentEncoding: base64 }
                    additionalProperties: false
              additionalProperties: false
      responses:
        '200':
          description: Exact durable stage state; ready=false is never activation success.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CandidateStageResult' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '413': { $ref: '#/components/responses/ErrorResponse' }
        '500': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/candidates/activate:
    post:
      operationId: activateCandidate
      summary: Atomically activate a ready candidate when the expected active identity matches.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [profileId, candidateId, expectedActiveCandidateId]
              properties:
                profileId: { type: string, minLength: 1, maxLength: 128 }
                candidateId: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
                expectedActiveCandidateId:
                  type: [string, 'null']
                  pattern: '^sha256:[0-9a-f]{64}$'
                  description: Null only when replacing the legacy/unversioned active profile.
              additionalProperties: false
      responses:
        '200':
          description: Actual active identity after the compare-and-set attempt.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CandidateActivationResult' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '413': { $ref: '#/components/responses/ErrorResponse' }
        '500': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/candidates/rollback:
    post:
      operationId: rollbackCandidate
      summary: Roll back to a named ready candidate under an exact compare-and-set fence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [profileId, candidateId, expectedActiveCandidateId]
              properties:
                profileId: { type: string, minLength: 1, maxLength: 128 }
                candidateId: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
                expectedActiveCandidateId:
                  type: [string, 'null']
                  pattern: '^sha256:[0-9a-f]{64}$'
              additionalProperties: false
      responses:
        '200':
          description: Actual active identity after rollback, including named post-switch failure.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CandidateRollbackResult' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '413': { $ref: '#/components/responses/ErrorResponse' }
        '500': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/profiles/{profileId}/pause:
    post:
      operationId: pauseProfile
      summary: Atomically block new runs while reporting existing pinned runs truthfully.
      parameters:
        - in: path
          name: profileId
          required: true
          schema: { type: string, minLength: 1, maxLength: 128 }
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [expectedDeploymentRevision]
              properties:
                expectedDeploymentRevision: { type: integer, minimum: 1 }
              additionalProperties: false
      responses:
        '200':
          description: Durable paused routing state and actual draining run count.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProfileDeploymentResult' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/profiles/{profileId}/resume:
    post:
      operationId: resumeProfile
      summary: Reverify the active candidate before accepting new work again.
      parameters:
        - in: path
          name: profileId
          required: true
          schema: { type: string, minLength: 1, maxLength: 128 }
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [expectedDeploymentRevision]
              properties:
                expectedDeploymentRevision: { type: integer, minimum: 1 }
              additionalProperties: false
      responses:
        '200':
          description: Durable active routing state after exact-byte runtime verification.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProfileDeploymentResult' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/profiles:
    get:
      operationId: listProfiles
      summary: List the caller's bounded public profile catalog.
      responses:
        '200':
          description: Delegated callers receive only their scoped profile and safe deployment summary.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PublicProfileSummary' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/profile-candidates/{candidateId}:
    parameters:
      - in: path
        name: candidateId
        required: true
        schema: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
    get:
      operationId: getCandidate
      summary: Read bounded candidate lifecycle and deletion eligibility.
      responses:
        '200':
          description: Safe candidate status without host paths or candidate bytes.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CandidateStatus' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
    delete:
      operationId: deleteCandidate
      summary: Delete only a verified eligible candidate using its natural idempotent identity.
      responses:
        '200':
          description: Actual verified deletion or explicit partial failure state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CandidateDeletionResult' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/profiles/{profileId}/candidates:
    get:
      operationId: listCandidates
      summary: List bounded candidate status for one profile scope.
      parameters:
        - in: path
          name: profileId
          required: true
          schema: { type: string, minLength: 1, maxLength: 128 }
      responses:
        '200':
          description: Candidate status records in deterministic creation order.
          content:
            application/json:
              schema:
                type: object
                required: [profileId, items]
                properties:
                  profileId: { type: string }
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/CandidateStatus' }
                additionalProperties: false
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/profiles/{profileId}/deployment:
    get:
      operationId: getProfileDeployment
      summary: Read durable routing revision, actual active candidate and observed health.
      parameters:
        - in: path
          name: profileId
          required: true
          schema: { type: string, minLength: 1, maxLength: 128 }
      responses:
        '200':
          description: Safe current deployment status and active-run drain count.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProfileDeploymentStatus' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/auth/delegations:
    post:
      operationId: issueDelegation
      summary: Owner-only issuance of a short-lived scoped runtime principal.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [delegateId, workspaceId, profileId, purpose, operations]
              properties:
                delegateId: { type: string, minLength: 1, maxLength: 128 }
                subjectId:
                  type: string
                  minLength: 1
                  maxLength: 128
                  description: Explicit grant subject; required when operations includes source_content.read, source_content.search or source_data_views.query.
                workspaceId: { type: string, minLength: 1, maxLength: 128 }
                profileId: { type: string, minLength: 1, maxLength: 128 }
                purpose: { type: string, minLength: 1, maxLength: 64 }
                channel: { type: string, minLength: 1, maxLength: 64 }
                operations:
                  type: array
                  minItems: 1
                  maxItems: 32
                  items: { type: string }
                ttlSeconds: { type: integer, minimum: 1, maximum: 3600, default: 900 }
              additionalProperties: false
      responses:
        '201':
          description: Delegation issued. The token is a bearer secret and is never persisted by the Gateway.
          headers:
            Cache-Control:
              schema: { type: string, const: no-store }
          content:
            application/json:
              schema:
                type: object
                required: [token, principal]
                properties:
                  token: { type: string, writeOnly: true }
                  principal: { $ref: '#/components/schemas/DelegatedPrincipal' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '413': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/auth/delegations/{tokenId}/revoke:
    post:
      operationId: revokeDelegation
      summary: Owner-only immediate revocation of a delegated runtime principal.
      parameters:
        - name: tokenId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, minLength: 1, maxLength: 64 }
              additionalProperties: false
      responses:
        '200':
          description: Delegation revoked.
          content:
            application/json:
              schema:
                type: object
                required: [tokenId, revoked]
                properties:
                  tokenId: { type: string, format: uuid }
                  revoked: { type: boolean, const: true }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '413': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/run:
    post:
      operationId: run
      summary: Start a run. Returns immediately; stream the reply over SSE.
      description: >
        A delegated principal may continue only a thread already bound to the
        same verified delegate, workspace, profile, subject, purpose and
        channel context. A mismatch or unbound thread is denied before mutation.
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          description: >
            UUID identifying this exact logical run start. Reuse only for a
            retry of the same validated input. Required for delegated principals.
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [profileId, prompt]
              properties:
                profileId:
                  type: string
                  description: Which profile answers (the `name` in its agent.json).
                prompt:
                  type: string
                threadId:
                  type: string
                  description: Continue an existing conversation; omit for a new thread.
                model:
                  type: string
                  description: >
                    Override the model (`provider:model`). Omitted → the
                    thread's model, else the profile's default — and if that
                    default's provider has no credentials, the gateway falls
                    back to a model that can answer (vault/env provider,
                    else a reachable local Ollama).
                attachments:
                  type: array
                  maxItems: 8
                  description: >
                    Bounded one-turn untrusted data. This does not register a
                    reusable source or grant future access.
                  items:
                    $ref: '#/components/schemas/RunAttachmentInput'
      responses:
        '200':
          description: Run started in the background.
          content:
            application/json:
              schema:
                type: object
                required: [runId, threadId]
                properties:
                  runId: { type: string, format: uuid }
                  threadId: { type: string }
                  agentId: { type: string, description: "'root' for a plain run" }
                  profileId: { type: string }
                  candidateId:
                    type: [string, 'null']
                    pattern: '^sha256:[0-9a-f]{64}$'
                    description: Immutable candidate pinned before execution; null for a legacy profile.
                  model:
                    type: string
                    description: The model ACTUALLY dispatched (incl. keyless fallback).
                  status: { type: string }
                  timeoutMs:
                    type: integer
                    minimum: 1
                    description: Enforced wall-clock run timeout selected from the resolved profile.
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '413': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/runs/{runId}:
    get:
      operationId: runSnapshot
      summary: Read one immutable run's bounded durable lifecycle snapshot.
      description: >
        Delegated access requires the run's thread to remain bound to the same
        verified authority context that created it.
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Safe execution snapshot; thread status and socket state are not substitutes.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunSnapshot' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/runs/{runId}/events:
    get:
      operationId: runEvents
      summary: Replay and tail only one immutable run's root-agent event interval.
      description: >
        Delegated access requires the run's thread to remain bound to the same
        verified authority context that created it.
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: since
          in: query
          required: false
          schema: { type: integer, minimum: 0 }
          description: Exclusive cursor; defaults to the run's persisted startSeq.
      responses:
        '200':
          description: Bounded text/event-stream. Terminal snapshots close after replay.
          content:
            text/event-stream:
              schema: { type: string }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '410': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/threads/{threadId}/agents/root/events:
    get:
      operationId: events
      summary: >
        The run's event stream (SSE). Stays open indefinitely — a reply
        is finished at its terminal event (see asyncapi.yaml), not at
        stream close. Reconnect with ?since=<highest seq seen>.
      parameters:
        - name: threadId
          in: path
          required: true
          schema: { type: string }
        - name: since
          in: query
          required: false
          schema: { type: integer, default: 0 }
          description: Replay events with seq greater than this cursor.
      responses:
        '200':
          description: text/event-stream; each frame's data is one JSON event carrying `seq`.
          content:
            text/event-stream:
              schema: { type: string }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/threads/{threadId}/resume:
    post:
      operationId: resume
      summary: Answer a permission.request (or other pause) — the run resumes.
      parameters:
        - name: threadId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [approve, deny, always, answer, allow_folder_session]
                answer:
                  type: string
                  description: Free-text reply when action is `answer`.
                requestId:
                  type: string
                  description: Specific pending request when several are outstanding.
                grantPath:
                  type: string
                  description: Absolute path granted when action is `allow_folder_session`.
      responses:
        '200': { description: Decision delivered. }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '413': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/runs/{runId}/permissions/{requestId}/decision:
    post:
      operationId: decidePermission
      summary: Decide one exact permission request for one immutable run.
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: requestId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision, operationHash]
              additionalProperties: false
              properties:
                decision: { type: string, enum: [approve, deny] }
                operationHash: { type: string, pattern: '^[0-9a-f]{64}$' }
      responses:
        '200':
          description: Exact decision durably recorded and delivered to the live request.
          content:
            application/json:
              schema:
                type: object
                required: [runId, requestId, decision, operationHash]
                properties:
                  runId: { type: string, format: uuid }
                  requestId: { type: string }
                  decision: { type: string, enum: [approve, deny] }
                  operationHash: { type: string, pattern: '^[0-9a-f]{64}$' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '413': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/runs/{runId}/cancel:
    post:
      operationId: cancelRun
      summary: Durably request cancellation of one immutable run.
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '202':
          description: Cancellation was durably requested; final outcome is not yet confirmed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunCancellationResult' }
        '200':
          description: The run was already terminal; no state was reopened.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunCancellationResult' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/threads/{threadId}/abort:
    post:
      operationId: abortLegacy
      deprecated: true
      summary: Owner-only legacy thread abort; delegated clients use exact run cancellation.
      parameters:
        - name: threadId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Legacy cancellation signal accepted; this is not proof of final cancellation. }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/models:
    get:
      operationId: models
      summary: The model catalog with LIVE availability.
      responses:
        '200':
          description: Every model the gateway knows.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [id]
                  properties:
                    id: { type: string, description: "Canonical `provider:model` id." }
                    name: { type: string }
                    provider: { type: string }
                    hasCredentials:
                      type: boolean
                      description: >
                        Can answer RIGHT NOW: a key is saved/exported, or —
                        for ollama — a local server answered the probe.
                    default:
                      type: boolean
                      description: At most one per provider — the recommended pick.
        '401': { $ref: '#/components/responses/ErrorResponse' }

components:
  responses:
    ErrorResponse:
      description: Safe typed error. Raw internal/provider detail is not returned.
      headers:
        X-Ownware-Correlation-Id:
          schema: { type: string, format: uuid }
          description: Opaque server-generated support correlation.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    SourceCreationConflictResponse:
      description: >
        Safe typed creation conflict. `source_quota_exceeded` reports only the
        blocked resource class plus standard safe error metadata; it never
        reports usage, failed workspace/profile scope, resource identities,
        paths, or a retry delay.
      headers:
        X-Ownware-Correlation-Id:
          schema: { type: string, format: uuid }
          description: Opaque server-generated support correlation.
      content:
        application/json:
          schema:
            oneOf:
              - allOf:
                  - { $ref: '#/components/schemas/ErrorResponse' }
                  - not:
                      required: [error]
                      properties:
                        error: { const: source_quota_exceeded }
              - { $ref: '#/components/schemas/SourceQuotaExceededError' }
    SourceDeletionErrorResponse:
      description: Safe typed deletion error without artifact or storage detail.
      headers:
        X-Ownware-Correlation-Id:
          schema: { type: string, format: uuid }
          description: Opaque server-generated support correlation.
        Retry-After:
          schema: { type: integer, minimum: 0 }
          description: Present for rate limits and an in-progress idempotent request only.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/SourceDeletionError' }
  schemas:
    RunSnapshot:
      type: object
      required: [runId, threadId, workspaceId, profileId, candidateId, model, timeoutMs, status, terminal, outcomeKnown, acceptedAt, startedAt, updatedAt, terminalAt, cancelRequestedAt, startSeq, endSeq, earliestRetainedCursor, code]
      properties:
        runId: { type: string, format: uuid }
        threadId: { type: string }
        workspaceId: { type: [string, 'null'] }
        profileId: { type: string }
        candidateId: { type: [string, 'null'], pattern: '^sha256:[0-9a-f]{64}$' }
        model: { type: string }
        timeoutMs: { type: integer, minimum: 1 }
        status:
          type: string
          enum: [accepted, running, waiting, cancel_requested, succeeded, failed, cancelled, timed_out, indeterminate]
        terminal: { type: boolean }
        outcomeKnown: { type: boolean }
        acceptedAt: { type: integer }
        startedAt: { type: [integer, 'null'] }
        updatedAt: { type: integer }
        terminalAt: { type: [integer, 'null'] }
        cancelRequestedAt: { type: [integer, 'null'] }
        startSeq: { type: integer, minimum: 0 }
        endSeq: { type: [integer, 'null'], minimum: 0 }
        earliestRetainedCursor:
          type: [integer, 'null']
          minimum: 0
          description: Earliest exclusive cursor that can replay this run without a retained-history gap.
        code: { type: [string, 'null'] }
    RunCancellationResult:
      type: object
      required: [runId, status, terminal, outcomeKnown, cancellation]
      properties:
        runId: { type: string, format: uuid }
        status:
          type: string
          enum: [accepted, running, waiting, cancel_requested, succeeded, failed, cancelled, timed_out, indeterminate]
        terminal: { type: boolean }
        outcomeKnown: { type: boolean }
        cancellation:
          type: string
          enum: [requested, already_requested, already_terminal]
    RunAttachmentInput:
      type: object
      required: [filename, data, mimeType]
      properties:
        filename:
          type: string
          minLength: 1
          maxLength: 255
          description: Safe display basename; path separators and control characters reject.
        data:
          type: string
          minLength: 4
          maxLength: 5592408
          contentEncoding: base64
          description: Strict canonical base64; decoded bytes are bounded independently.
        mimeType:
          type: string
          minLength: 3
          maxLength: 127
          description: Declared type; the runtime verifies it against bytes and filename category.
      additionalProperties: false
    PublicGatewayLimits:
      type: object
      required: [jsonBodyBytes, candidateUpload, runAttachments, sourceList, connectionList, sourceUpload, sourceInspection, sourcePreparation, sourceDataView, accessGrants, sourceContent, sourceSearch, sourceQuota, delegationDefaultTtlSeconds, delegationMaxTtlSeconds, idempotencyRetentionSeconds, rateLimit]
      properties:
        jsonBodyBytes:
          type: integer
          const: 10485760
          description: Maximum body size for public operations that parse JSON.
        candidateUpload:
          type: object
          required: [maxFiles, maxDecodedBytes, maxPathCharacters]
          properties:
            maxFiles: { type: integer, const: 1000 }
            maxDecodedBytes: { type: integer, const: 6291456 }
            maxPathCharacters: { type: integer, const: 256 }
          additionalProperties: false
        runAttachments:
          type: object
          required: [maxCount, maxItemDecodedBytes, maxTotalDecodedBytes, maxFilenameCharacters]
          properties:
            maxCount: { type: integer, const: 8 }
            maxItemDecodedBytes: { type: integer, const: 4194304 }
            maxTotalDecodedBytes: { type: integer, const: 6291456 }
            maxFilenameCharacters: { type: integer, const: 255 }
          additionalProperties: false
        sourceList:
          type: object
          required: [maxPageSize]
          properties:
            maxPageSize: { type: integer, const: 100 }
          additionalProperties: false
        connectionList:
          type: object
          required: [maxPageSize]
          properties:
            maxPageSize: { type: integer, const: 100 }
          additionalProperties: false
        sourceUpload:
          type: object
          required: [maxDecodedBytes, maxChunkBytes, maxChunks, sessionTtlSeconds, supportedSourceKinds, supportedMediaTypes]
          properties:
            maxDecodedBytes: { type: integer, const: 16777216 }
            maxChunkBytes: { type: integer, const: 1048576 }
            maxChunks: { type: integer, const: 64 }
            sessionTtlSeconds: { type: integer, const: 900 }
            supportedSourceKinds:
              type: array
              prefixItems:
                - { const: file }
                - { const: text }
                - { const: structured_export }
              minItems: 3
              maxItems: 3
            supportedMediaTypes:
              type: array
              prefixItems:
                - { const: text/plain }
                - { const: application/pdf }
              minItems: 2
              maxItems: 2
          additionalProperties: false
        sourceInspection:
          type: object
          required: [maxBytes, perAttemptTimeoutMs, maxAttempts]
          properties:
            maxBytes: { type: integer, const: 16777216 }
            perAttemptTimeoutMs: { type: integer, const: 5000 }
            maxAttempts: { type: integer, const: 3 }
          additionalProperties: false
        sourcePreparation:
          type: object
          required: [maxBytes, perAttemptTimeoutMs, maxAttempts, maxResourcesPerJob]
          properties:
            maxBytes: { type: integer, const: 16777216 }
            perAttemptTimeoutMs: { type: integer, const: 5000 }
            maxAttempts: { type: integer, const: 3 }
            maxResourcesPerJob: { type: integer, const: 1 }
          additionalProperties: false
        sourceDataView:
          type: object
          required: [supportedFormats, maxSourceBytes, maxArtifactBytes, maxFields, maxRows, maxCellBytes, maxCells, perAttemptTimeoutMs, maxAttempts, maxQueryFields, maxQueryRows, maxQueryCells, maxQueryResultBytes, queryTimeoutMs, maxGrantScopeIds]
          properties:
            supportedFormats:
              type: array
              prefixItems:
                - { const: strict_utf8_csv }
              minItems: 1
              maxItems: 1
            maxSourceBytes: { type: integer, const: 16777216 }
            maxArtifactBytes: { type: integer, const: 134217728 }
            maxFields: { type: integer, const: 256 }
            maxRows: { type: integer, const: 100000 }
            maxCellBytes: { type: integer, const: 65536 }
            maxCells: { type: integer, const: 1000000 }
            perAttemptTimeoutMs: { type: integer, const: 5000 }
            maxAttempts: { type: integer, const: 3 }
            maxQueryFields: { type: integer, const: 32 }
            maxQueryRows: { type: integer, const: 256 }
            maxQueryCells: { type: integer, const: 8192 }
            maxQueryResultBytes: { type: integer, const: 262144 }
            queryTimeoutMs: { type: integer, const: 2000 }
            maxGrantScopeIds: { type: integer, const: 256 }
          additionalProperties: false
        accessGrants:
          type: object
          required: [minTtlSeconds, maxTtlSeconds, maxActivePerWorkspaceProfile, maxPageSize]
          properties:
            minTtlSeconds: { type: integer, const: 60 }
            maxTtlSeconds: { type: integer, const: 2592000 }
            maxActivePerWorkspaceProfile: { type: integer, const: 1024 }
            maxPageSize: { type: integer, const: 100 }
          additionalProperties: false
        sourceContent:
          type: object
          required: [maxRangeBytes]
          properties:
            maxRangeBytes: { type: integer, const: 65536 }
          additionalProperties: false
        sourceSearch:
          type: object
          required: [maxScanBytes, maxQueryBytes, maxMatches, maxContextBytes, perRequestTimeoutMs, matchModes]
          properties:
            maxScanBytes: { type: integer, const: 16777216 }
            maxQueryBytes: { type: integer, const: 128 }
            maxMatches: { type: integer, const: 20 }
            maxContextBytes: { type: integer, const: 1024 }
            perRequestTimeoutMs: { type: integer, const: 5000 }
            matchModes:
              type: array
              prefixItems:
                - { const: exact_utf8 }
                - { const: ascii_case_insensitive }
              minItems: 2
              maxItems: 2
          additionalProperties: false
        sourceQuota:
          type: object
          required: [workspace, profile]
          description: >
            Effective source ceilings negotiated for this Gateway instance.
            These values are instance limits, not schema-defined defaults.
          properties:
            workspace: { $ref: '#/components/schemas/SourceQuotaCeilings' }
            profile: { $ref: '#/components/schemas/SourceQuotaCeilings' }
          additionalProperties: false
        delegationDefaultTtlSeconds: { type: integer, const: 900 }
        delegationMaxTtlSeconds: { type: integer, const: 3600 }
        idempotencyRetentionSeconds: { type: integer, const: 604800 }
        rateLimit:
          type: object
          required: [enabled, windowSeconds, generalRequests, runStarts]
          properties:
            enabled: { type: boolean }
            windowSeconds: { type: integer, const: 60 }
            generalRequests: { type: integer, minimum: 0 }
            runStarts: { type: integer, minimum: 0 }
    SourceQuotaCeilings:
      type: object
      required: [maxSourceRegistrations, maxRetainedAndReservedBytes, maxActiveUploadSessions, maxNonterminalJobs, maxDerivedResources]
      description: Positive effective ceilings for one workspace or profile scope.
      properties:
        maxSourceRegistrations: { type: integer, minimum: 1 }
        maxRetainedAndReservedBytes: { type: integer, minimum: 1 }
        maxActiveUploadSessions: { type: integer, minimum: 1 }
        maxNonterminalJobs: { type: integer, minimum: 1 }
        maxDerivedResources: { type: integer, minimum: 1 }
      additionalProperties: false
    SourceRegistrationInput:
      type: object
      required: [kind, label, classification, authority, audiencePolicyRef, sensitivityPolicyRef, purposePolicyRef, retentionPolicyRef, freshnessPolicyRef]
      properties:
        kind:
          type: string
          enum: [file, text, visual, structured_export, cloud_document, connected_snapshot, supported_other]
        label:
          type: string
          minLength: 1
          maxLength: 160
          description: Safe single-line display label; control characters reject.
        classification: { type: string, enum: [public, internal, confidential, restricted] }
        authority: { type: string, enum: [source_of_record, supporting_reference, example, excluded] }
        audiencePolicyRef: { type: string, pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$' }
        sensitivityPolicyRef: { type: string, pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$' }
        purposePolicyRef: { type: string, pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$' }
        retentionPolicyRef: { type: string, pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$' }
        freshnessPolicyRef: { type: string, pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$' }
      additionalProperties: false
    SourceHealth:
      type: object
      required: [registration, inspection, preparation, access, freshness, conflict, deletion]
      properties:
        registration: { type: string, enum: [pending, registered, rejected] }
        inspection: { type: string, enum: [not_started, queued, inspecting, complete, partial, failed] }
        preparation: { type: string, enum: [not_requested, queued, preparing, ready, partial, failed] }
        access: { type: string, enum: [available, denied, expired, disconnected, wrong_identity] }
        freshness: { type: string, enum: [fresh, aging, stale, unknown] }
        conflict: { type: string, enum: [none, suspected, confirmed, resolved] }
        deletion: { type: string, enum: [active, frozen, deleting, partially_deleted, deleted] }
      additionalProperties: false
    SourceManifest:
      type: object
      required: [sourceId, kind, label, classification, authority, audiencePolicyRef, sensitivityPolicyRef, purposePolicyRef, retentionPolicyRef, freshnessPolicyRef, revision, currentVersionId, health, createdAt, updatedAt]
      properties:
        sourceId: { type: string, format: uuid }
        kind:
          type: string
          enum: [file, text, visual, structured_export, cloud_document, connected_snapshot, supported_other]
        label: { type: string, minLength: 1, maxLength: 160 }
        classification: { type: string, enum: [public, internal, confidential, restricted] }
        authority: { type: string, enum: [source_of_record, supporting_reference, example, excluded] }
        audiencePolicyRef: { type: string, pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$' }
        sensitivityPolicyRef: { type: string, pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$' }
        purposePolicyRef: { type: string, pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$' }
        retentionPolicyRef: { type: string, pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$' }
        freshnessPolicyRef: { type: string, pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$' }
        revision: { type: integer, minimum: 1 }
        currentVersionId: { type: [string, 'null'], format: uuid }
        health: { $ref: '#/components/schemas/SourceHealth' }
        createdAt: { type: integer, minimum: 0 }
        updatedAt: { type: integer, minimum: 0 }
      additionalProperties: false
    SourceList:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          maxItems: 100
          items: { $ref: '#/components/schemas/SourceManifest' }
        nextCursor: { type: [string, 'null'], format: uuid }
      additionalProperties: false
    ConnectionInventoryItem:
      type: object
      required: [connectionId, capabilityId, status, recovery, changedAt, expiresAt, lastVerifiedAt]
      properties:
        connectionId:
          type: string
          format: uuid
          description: Ownware-owned opaque identity; never a vendor account handle.
        capabilityId:
          type: string
          pattern: '^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$'
          description: Provider-neutral logical capability identity.
        status: { type: string, enum: [pending, connected, failed, expired] }
        recovery:
          type: string
          enum: [none, complete_connection, reconnect, verify_revocation]
        changedAt:
          type: integer
          minimum: 0
          multipleOf: 1000
          description: Durable state-change time reduced to whole-second precision.
        expiresAt: { type: [integer, 'null'], minimum: 0, multipleOf: 1000 }
        lastVerifiedAt: { type: [integer, 'null'], minimum: 0, multipleOf: 1000 }
      additionalProperties: false
    ConnectionList:
      type: object
      required: [items, nextCursor, accessPolicy]
      properties:
        items:
          type: array
          maxItems: 100
          items: { $ref: '#/components/schemas/ConnectionInventoryItem' }
        nextCursor: { type: [string, 'null'], format: uuid }
        accessPolicy:
          type: string
          const: separate_grant_required
          description: Connection alone grants no resource or action authority.
      additionalProperties: false
    CreateSourceUploadSessionInput:
      type: object
      required: [expectedBytes, expectedChecksum, declaredMediaType, filename]
      properties:
        expectedBytes: { type: integer, minimum: 1, maximum: 16777216 }
        expectedChecksum: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
        declaredMediaType: { type: string, enum: [text/plain, application/pdf] }
        filename: { type: string, minLength: 1, maxLength: 255, description: Untrusted basename label only. }
      additionalProperties: false
    SourceUploadSession:
      type: object
      required: [uploadId, sourceId, state, offset, expectedBytes, expectedChecksum, declaredMediaType, maxChunkBytes, maxChunks, expiresAt, createdAt]
      properties:
        uploadId: { type: string, format: uuid }
        sourceId: { type: string, format: uuid }
        state: { const: open }
        offset: { type: integer, const: 0 }
        expectedBytes: { type: integer, minimum: 1, maximum: 16777216 }
        expectedChecksum: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
        declaredMediaType: { type: string, enum: [text/plain, application/pdf] }
        maxChunkBytes: { type: integer, const: 1048576 }
        maxChunks: { type: integer, const: 64 }
        expiresAt: { type: integer, minimum: 0 }
        createdAt: { type: integer, minimum: 0 }
      additionalProperties: false
    SourceUploadChunkResult:
      type: object
      required: [uploadId, state, offset, chunkCount, replayed]
      properties:
        uploadId: { type: string, format: uuid }
        state: { const: open }
        offset: { type: integer, minimum: 0 }
        chunkCount: { type: integer, minimum: 1, maximum: 64 }
        replayed: { type: boolean }
      additionalProperties: false
    SourceVersionManifest:
      type: object
      required: [sourceVersionId, sourceId, checksum, verifiedMediaType, byteCount, inspection, createdAt]
      properties:
        sourceVersionId: { type: string, format: uuid }
        sourceId: { type: string, format: uuid }
        checksum: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
        verifiedMediaType: { type: string, enum: [text/plain, application/pdf] }
        byteCount: { type: integer, minimum: 1, maximum: 16777216 }
        inspection: { type: string, enum: [not_started, queued, inspecting, complete, partial, failed] }
        createdAt: { type: integer, minimum: 0 }
      additionalProperties: false
    SourceUploadCompletionResult:
      type: object
      required: [sourceVersionId, sourceId, checksum, verifiedMediaType, byteCount, inspection, createdAt, replayed]
      properties:
        sourceVersionId: { type: string, format: uuid }
        sourceId: { type: string, format: uuid }
        checksum: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
        verifiedMediaType: { type: string, enum: [text/plain, application/pdf] }
        byteCount: { type: integer, minimum: 1, maximum: 16777216 }
        inspection: { const: not_started }
        createdAt: { type: integer, minimum: 0 }
        replayed: { type: boolean }
      additionalProperties: false
    SourceJob:
      type: object
      required: [jobId, sourceId, sourceVersionId, operation, implementationVersion, resourceId, dataViewId, state, attempt, maxAttempts, checkpoint, cancelRequestedAt, outcomeCode, createdAt, updatedAt, terminalAt]
      properties:
        jobId: { type: string, format: uuid }
        sourceId: { type: string, format: uuid }
        sourceVersionId: { type: string, format: uuid }
        operation: { type: string, enum: [inspect_format, extract_text, prepare_data_view] }
        implementationVersion: { type: string, enum: [inspect_format.v1, text_extraction.v1, csv_data_view.v1] }
        resourceId:
          type: [string, 'null']
          format: uuid
          description: Published only after successful preparation creates its safe resource manifest.
        dataViewId:
          type: [string, 'null']
          format: uuid
          description: Published only after successful Data View preparation; no cells or private locator are returned.
        state:
          type: string
          enum: [queued, running, waiting_for_resource, cancel_requested, succeeded, partial, failed, cancelled]
        attempt: { type: integer, minimum: 0, maximum: 3 }
        maxAttempts: { type: integer, const: 3 }
        checkpoint: { type: integer, minimum: 0, maximum: 4 }
        cancelRequestedAt: { type: [integer, 'null'], minimum: 0 }
        outcomeCode:
          type: [string, 'null']
