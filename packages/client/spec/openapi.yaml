          maxItems: 256
          uniqueItems: true
          items: { type: string, pattern: '^field\.[0-9a-f]{32}$' }
        rowOffset:
          type: integer
          minimum: 0
          maximum: 99999
          description: First row ordinal in the exact grant window.
        rowCount:
          type: integer
          minimum: 1
          maximum: 256
          description: Exact row count; a window extending beyond the current manifest rejects rather than clipping.
        ttlSeconds: { type: integer, minimum: 60, maximum: 2592000 }
      additionalProperties: false
    QuerySourceDataViewInput:
      type: object
      required: [consent, fieldIds, rowOffset, rowCount]
      properties:
        consent: { $ref: '#/components/schemas/AccessConsent' }
        fieldIds:
          type: array
          minItems: 1
          maxItems: 32
          uniqueItems: true
          items: { type: string, pattern: '^field\.[0-9a-f]{32}$' }
        rowOffset: { type: integer, minimum: 0, maximum: 99999 }
        rowCount: { type: integer, minimum: 1, maximum: 256 }
      additionalProperties: false
      description: >
        The product of fieldIds and rowCount cannot exceed 8192. Identity,
        purpose, channel, operation, autonomy and permission mode are never body fields.
