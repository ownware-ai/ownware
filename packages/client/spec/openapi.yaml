      type: object
      required: [rowId, ordinal, values]
      properties:
        rowId: { type: string, pattern: '^row\.[0-9a-f]{32}$' }
        ordinal: { type: integer, minimum: 0, maximum: 99999 }
        values:
          type: array
          minItems: 1
          maxItems: 32
          items:
            type: string
            description: Inert untrusted source data; never interpreted as an instruction or expression.
      additionalProperties: false
    ProtectedSourceDataViewSelection:
      type: object
      required: [dataViewId, sourceId, sourceVersionId, sourceRevision, sourceChecksum, artifactChecksum, freshness, classification, authority, implementationVersion, rowOffset, requestedRowCount, returnedRowCount, totalRowCount, complete, fields, rows, observedAt]
      properties:
