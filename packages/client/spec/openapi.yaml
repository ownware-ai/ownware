    CreateDataViewQueryGrantInput:
      type: object
      required: [subjectId, purpose, channel, consent, fieldIds, rowOffset, rowCount, ttlSeconds]
      properties:
        subjectId: { type: string, minLength: 1, maxLength: 128 }
        purpose: { type: string, minLength: 1, maxLength: 64 }
        channel: { type: [string, 'null'], minLength: 1, maxLength: 64 }
