# The Ownware gateway wire contract — SSE event vocabulary, v1.
#
# Companion to openapi.yaml. Every frame on
# GET /api/v1/runs/{runId}/events is one JSON object
# carrying `type` and `seq`. `seq` is the resume cursor: reconnect with
# ?since=<highest seen> and the stream resumes without replaying.
#
# THE TERMINATION RULE (the one thing every consumer must know): the
# run-scoped stream closes after its bounded terminal event. One run's reply
# is finished at:
#   - turn.end whose stopReason is NOT tool_use / pause_turn, or
#   - turn.interrupted, error, or stream.shutdown.
# @ownware/client's streamReply() encodes exactly this.

asyncapi: 3.0.0
info:
  title: Ownware Gateway — run event stream
  version: 0.30.0

channels:
  runEvents:
    address: /api/v1/runs/{runId}/events
    messages:
      textDelta:
        name: text.delta
        summary: Streamed assistant text.
        payload:
          type: object
          required: [type, seq, text]
          properties:
            type: { const: text.delta }
            seq: { type: integer }
            text: { type: string }
      toolCallStart:
        name: tool.call.start
        summary: The agent started a tool call.
        payload:
          type: object
          required: [type, seq, toolName]
          properties:
            type: { const: tool.call.start }
            seq: { type: integer }
            toolName: { type: string }
            input: { type: object }
      toolCallEnd:
        name: tool.call.end
        summary: Tool call finished.
        payload:
          type: object
          required: [type, seq, toolName]
          properties:
            type: { const: tool.call.end }
            seq: { type: integer }
            toolName: { type: string }
            isError: { type: boolean }
            durationMs: { type: integer }
      toolCallProgress:
        name: tool.call.progress
        summary: >
          Incremental progress from a running tool (a "work line"). Long
          procedures narrate through these instead of going silent. Additive —
          consumers may ignore it.
        payload:
          type: object
          required: [type, seq, toolCallId, progress]
          properties:
            type: { const: tool.call.progress }
            seq: { type: integer }
            toolCallId: { type: string }
            progress: { type: string }
      permissionRequest:
        name: permission.request
        summary: >
          Run paused, awaiting an exact decision. Answer via POST
          /runs/{runId}/permissions/{requestId}/decision with the emitted
          operationHash.
        payload:
          type: object
          required: [type, seq, toolName, requestId, operationHash]
          properties:
            type: { const: permission.request }
            seq: { type: integer }
            toolName: { type: string }
            requestId: { type: string }
            operationHash: { type: string, pattern: '^[0-9a-f]{64}$' }
      turnEnd:
        name: turn.end
        summary: >
          One model call finished. TERMINAL for the run unless
          stopReason is tool_use or pause_turn (the loop continues).
        payload:
          type: object
          required: [type, seq]
          properties:
            type: { const: turn.end }
            seq: { type: integer }
            stopReason: { type: string }
            usage: { type: object }
      turnInterrupted:
        name: turn.interrupted
        summary: Run ended outside turn.end (abort, timeout, shutdown). TERMINAL.
        payload:
          type: object
          required: [type, seq]
          properties:
            type: { const: turn.interrupted }
            seq: { type: integer }
            reason: { type: string }
      error:
        name: error
        summary: Something failed. TERMINAL.
        payload:
          type: object
          required: [type, seq, message]
          properties:
            type: { const: error }
            seq: { type: integer }
            code: { type: string }
            message: { type: string }
      streamShutdown:
        name: stream.shutdown
        summary: >
          Gateway is closing THIS socket (e.g. slow_consumer). TERMINAL
          for the connection — re-hydrate the run snapshot, then reconnect
          only if that run is still non-terminal.
        payload:
          type: object
          required: [type, seq]
          properties:
            type: { const: stream.shutdown }
            seq: { type: integer }
            reason: { type: string }
            retryAfterMs: { type: integer }
      heartbeat:
        name: heartbeat
        summary: Every ~30s regardless of traffic. Ignore; use for liveness timers.
        payload:
          type: object
          required: [type]
          properties:
            type: { const: heartbeat }
            ts: { type: integer }

# The full engine vocabulary (thinking deltas, sub-agent spawns,
# compaction, security blocks, …) is larger; events not listed here are
# non-contractual — render them generically or ignore them.
